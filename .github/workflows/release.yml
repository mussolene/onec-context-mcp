# On tag push (e.g. v1.0.0): build artifacts and create GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          pip install -e ".[dev,mcp]"
          pip install pip-audit

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Audit dependencies
        run: |
          # PYSEC-2025-183 is currently reported for the latest PyJWT release
          # pulled transitively by the official MCP SDK stack. There is no fixed
          # PyJWT version available yet, and the advisory is disputed upstream.
          pip-audit --ignore-vuln PYSEC-2025-183

      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests -v --cov=src/onec_help --cov-report=term-missing --cov-fail-under=74

  release:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package artifacts
        run: |
          pip install build
          python -m build
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body: ${{ steps.git-cliff.outputs.content }}
          generate_release_notes: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-docker:
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Validate release compose wiring
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}:latest
          HOST_HELP_SOURCE_BASE: /tmp/onec-help-empty
        run: |
          mkdir -p "$HOST_HELP_SOURCE_BASE"
          docker compose -f docker-compose.base.yml -f docker-compose.yml --profile ingest config --format json >/tmp/compose.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          services = json.loads(Path("/tmp/compose.json").read_text())["services"]
          mcp = services["mcp"]
          ingest = services["ingest-worker"]
          assert mcp["image"] == os.environ["APP_IMAGE"]
          assert ingest["image"] == mcp["image"]
          assert "build" in mcp
          assert "build" not in ingest
          PY

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
