# Build and push Docker image (e.g. to GHCR). Triggered on main/master or manually.
name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Validate deploy compose wiring
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}:latest
          HOST_HELP_SOURCE_BASE: /tmp/onec-help-empty
        run: |
          mkdir -p "$HOST_HELP_SOURCE_BASE"
          docker compose -f docker-compose.base.yml -f docker-compose.yml --profile ingest config --format json >/tmp/compose.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          services = json.loads(Path("/tmp/compose.json").read_text())["services"]
          mcp = services["mcp"]
          ingest = services["ingest-worker"]
          assert mcp["image"] == os.environ["APP_IMAGE"]
          assert ingest["image"] == mcp["image"]
          assert "build" in mcp
          assert "build" not in ingest
          PY

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
