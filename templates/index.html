<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1C Help File Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Tahoma, Arial, Helvetica, sans-serif;
            font-size: 0.7rem;
        }

        .sidebar {
            width: 300px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 20px;
            overflow-y: auto;
        }

        .content {
            margin-left: 320px;
            padding: 20px;
        }

        .tree-node {
            cursor: pointer;
            padding: 5px 0;
        }

        .tree-node.folder::before {
            content: '📁 ';
        }

        .tree-node.file::before {
            content: '📄 ';
        }

        .tree-node ul {
            list-style: none;
            padding-left: 20px;
        }

        #search-input {
            width: 100%;
            margin-bottom: 10px;
        }

        .V8SH_pagetitle {
            display: none;
        }

        .V8SH_title {
            background: gainsboro;
            font-weight: bold;
        }

        .V8SH_textarea {
            padding: 5px;
        }

        .V8SH_heading {
            text-decoration: underline;
            font-weight: bold;
        }

        .V8SH_chapter {
            font-weight: bold;
        }

        .V8SH_rubric {
            text-decoration: underline;
        }

        .V8SH_codesample {
            font-family: 'Courier New', monospace;
            background: #e6e6e6;
            padding: 8px;
            border-radius: 4px;
        }
        .collapsible-section { margin-bottom: 0.5em; }
        .collapsible-section > .section-header {
            cursor: pointer;
            font-weight: bold;
            padding: 4px 0;
            user-select: none;
        }
        .collapsible-section > .section-header::before {
            content: '▾ ';
            font-size: 0.8em;
        }
        .collapsible-section.collapsed > .section-header::before { content: '▸ '; }
        .collapsible-section.collapsed > .section-body { display: none; }
        .tree-node.folder .tree-toggle { margin-right: 4px; cursor: pointer; }
        .tree-node.folder.collapsed > ul { display: none; }
        .tree-node.folder > .tree-toggle::before { content: '▾'; }
        .tree-node.folder.collapsed > .tree-toggle::before { content: '▸'; }
        .source-hint { font-size: 0.75em; color: #6c757d; margin-top: 1em; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
</head>

<body>
    <div class="sidebar">
        <h4>1C Help File Viewer</h4>
        {% if not success %}
        <form method="post">
            <div class="mb-3">
                <label for="directory" class="form-label">Enter directory path</label>
                <input type="text" class="form-control" id="directory" name="directory"
                    placeholder="e.g., C:/path/to/unpacked">
            </div>
            <button type="submit" class="btn btn-primary">Load</button>
        </form>
        {% else %}
        <p class="text-muted small">Справка из data/ (конфиг)</p>
        {% endif %}
        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}
        {% if success %}
        <input type="text" id="search-input" class="form-control mt-3" placeholder="Поиск (дерево + индекс Qdrant)...">
        <div id="search-results" class="mt-2" style="display:none;"></div>
        <div id="tree"></div>
        {% endif %}
    </div>
    <div class="content">
        <nav id="breadcrumb" class="mb-2 small text-muted" aria-label="breadcrumb"></nav>
        <div id="html-content"></div>
        <div id="source-hint" class="source-hint"></div>
        <div id="see-also" class="mt-3 pt-3 border-top"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script>
        const treeData = {{ tree_elements | safe }};
        let currentPath = '';

        function buildTree(data, parentElement, depth = 0) {
            const ul = document.createElement('ul');
            ul.style.listStyle = 'none';
            ul.style.paddingLeft = '16px';
            data.forEach(node => {
                const li = document.createElement('li');
                li.className = node.is_folder ? 'tree-node folder' : 'tree-node file';
                li.dataset.id = node.id;
                if (node.is_folder) {
                    const toggle = document.createElement('span');
                    toggle.className = 'tree-toggle';
                    toggle.addEventListener('click', (e) => { e.stopPropagation(); li.classList.toggle('collapsed'); });
                    li.appendChild(toggle);
                    const label = document.createTextNode(node.identifier);
                    li.appendChild(label);
                    if (node.children.length > 0) {
                        buildTree(node.children, li, depth + 1);
                    }
                } else {
                    li.textContent = node.identifier;
                    li.dataset.path = node.html_path || '';
                    if (node.html_path) {
                        li.addEventListener('click', () => loadContent(node.html_path));
                    }
                }
                ul.appendChild(li);
            });
            parentElement.appendChild(ul);
        }

        function loadContent(path) {
            if (path === currentPath) return;
            currentPath = path;
            fetch(`/content/${encodeURIComponent(path)}?meta=1`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('html-content').innerHTML = data.content || '';
                    const bc = document.getElementById('breadcrumb');
                    if (data.breadcrumb && data.breadcrumb.length > 0) {
                        bc.innerHTML = data.breadcrumb.map((s, i) =>
                            i < data.breadcrumb.length - 1
                                ? `<span class="text-muted">${escapeHtml(s)}</span> › `
                                : `<span>${escapeHtml(s)}</span>`
                        ).join('');
                        bc.style.display = '';
                    } else {
                        bc.innerHTML = '';
                        bc.style.display = 'none';
                    }
                    const sa = document.getElementById('see-also');
                    const links = data.outgoing_links || [];
                    if (links.length > 0) {
                        sa.innerHTML = '<div class="V8SH_heading mb-2">См. также</div><ul class="list-unstyled small">' +
                            links.slice(0, 10).map(lnk => {
                                const p = lnk.resolved_path || lnk.path || '';
                                const t = lnk.target_title || lnk.link_text || p || 'Без названия';
                                return `<li><a href="#" data-path="${escapeHtml(p)}" class="see-also-link">${escapeHtml(t)}</a></li>`;
                            }).join('') + '</ul>';
                        sa.style.display = '';
                        sa.querySelectorAll('.see-also-link').forEach(a => {
                            a.addEventListener('click', (e) => {
                                e.preventDefault();
                                loadContent(a.dataset.path);
                            });
                        });
                    } else {
                        sa.innerHTML = '';
                        sa.style.display = 'none';
                    }
                    const sh = document.getElementById('source-hint');
                    if (data.hbk_slug) {
                        sh.textContent = 'Источник: ' + data.hbk_slug;
                        sh.style.display = '';
                    } else {
                        sh.textContent = '';
                        sh.style.display = 'none';
                    }
                    fixLinks();
                    initCollapsibleSections();
                    initHighlight();
                });
        }
        function initCollapsibleSections() {
            const container = document.getElementById('html-content');
            const chapters = Array.from(container.querySelectorAll('.V8SH_chapter'));
            chapters.forEach((ch) => {
                if (ch.closest('.collapsible-section')) return;
                const wrap = document.createElement('div');
                wrap.className = 'collapsible-section';
                const header = document.createElement('div');
                header.className = 'section-header';
                header.textContent = (ch.textContent || '').trim().replace(/:$/, '') || 'Секция';
                header.addEventListener('click', () => wrap.classList.toggle('collapsed'));
                const body = document.createElement('div');
                body.className = 'section-body';
                const toMove = [ch];
                let n = ch.nextElementSibling;
                while (n && !n.classList.contains('V8SH_chapter')) {
                    toMove.push(n);
                    n = n.nextElementSibling;
                }
                ch.parentNode.insertBefore(wrap, ch);
                toMove.forEach(el => body.appendChild(el));
                wrap.appendChild(header);
                wrap.appendChild(body);
            });
        }
        function initHighlight() {
            if (!window.hljs) return;
            const container = document.getElementById('html-content');
            container.querySelectorAll('pre code, pre, .V8SH_codesample').forEach((el) => {
                try { window.hljs.highlightElement(el); } catch (_) {}
            });
        }
        function escapeHtml(s) {
            if (!s) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function fixLinks() {
            const links = document.getElementById('html-content').getElementsByTagName('a');
            for (let link of links) {
                const href = link.getAttribute('href') || '';
                if (href.startsWith('/content/')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        loadContent(href.replace(/^\/content\//, ''));
                    });
                }
            }
            const images = document.getElementById('html-content').getElementsByTagName('img');
            for (let img of images) {
                if (img.src.startsWith('/download/')) {
                    img.src = img.src; // Ensure src is set correctly
                }
            }
        }

        let searchDebounceTimer = null;

        function searchTree(query) {
            const results = [];
            function searchNodes(nodes) {
                nodes.forEach(node => {
                    if (node.identifier.toLowerCase().includes(query.toLowerCase())) {
                        results.push(node);
                    }
                    searchNodes(node.children);
                });
            }
            searchNodes(treeData);
            const tree = document.getElementById('tree');
            tree.innerHTML = '';
            if (query) {
                results.forEach(node => {
                    const li = document.createElement('li');
                    li.className = node.is_folder ? 'tree-node folder' : 'tree-node file';
                    li.textContent = node.identifier;
                    if (node.html_path) {
                        li.addEventListener('click', () => loadContent(node.html_path));
                    }
                    tree.appendChild(li);
                });
            } else {
                buildTree(treeData, tree);
            }
        }

        function showSearchResults(data) {
            const el = document.getElementById('search-results');
            const tree = document.getElementById('tree');
            if (!data.results || data.results.length === 0) {
                el.style.display = 'none';
                return;
            }
            el.innerHTML = '<div class="small text-muted mb-1">По индексу Qdrant:</div>';
            data.results.forEach(r => {
                const a = document.createElement('a');
                a.href = '#';
                a.className = 'd-block small text-decoration-none py-1';
                a.textContent = r.title || r.path || 'Без названия';
                a.addEventListener('click', (e) => { e.preventDefault(); loadContent(r.path); });
                el.appendChild(a);
            });
            el.style.display = 'block';
        }

        function fetchSearch(q) {
            if (q.length < 2) {
                document.getElementById('search-results').style.display = 'none';
                return;
            }
            fetch(`/api/search?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(data => { if (data.error) return; showSearchResults(data); })
                .catch(() => {});
        }

        document.getElementById('search-input')?.addEventListener('input', (e) => {
            const q = e.target.value;
            searchTree(q);
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => fetchSearch(q), 350);
            if (q.length < 2) document.getElementById('search-results').style.display = 'none';
        });

        function findFirstPath(nodes) {
            for (const n of nodes || []) {
                if (n.html_path) return n.html_path;
                const p = findFirstPath(n.children);
                if (p) return p;
            }
            return null;
        }
        if (treeData) {
            buildTree(treeData, document.getElementById('tree'));
            const firstPath = findFirstPath(treeData);
            if (firstPath) loadContent(firstPath);
        }
    </script>
</body>

</html>
